name: Deploy to Hetzner VPS (Manual Sync)

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Soso Delivery to Hetzner VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 77.42.34.90 >> ~/.ssh/known_hosts

      - name: Sync Backend Files
        run: |
          # Créer archive du backend
          cd main-app-v10/admin-panel
          tar -czf /tmp/backend.tar.gz .
          
          # Envoyer au serveur
          scp /tmp/backend.tar.gz root@77.42.34.90:/tmp/
          
          # Extraire sur le serveur
          ssh root@77.42.34.90 << 'ENDSSH'
            cd /var/www/soso-delivery/backend
            tar -xzf /tmp/backend.tar.gz
            rm /tmp/backend.tar.gz
          ENDSSH

      - name: Sync Frontend Files
        run: |
          # Créer archive du frontend
          cd react-user-website/StackFood\ React
          tar -czf /tmp/frontend.tar.gz .
          
          # Envoyer au serveur
          scp /tmp/frontend.tar.gz root@77.42.34.90:/tmp/
          
          # Extraire sur le serveur
          ssh root@77.42.34.90 << 'ENDSSH'
            cd /var/www/soso-delivery/frontend
            tar -xzf /tmp/frontend.tar.gz
            rm /tmp/frontend.tar.gz
          ENDSSH

      - name: Deploy Backend
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            set -e
            
            cd /var/www/soso-delivery/backend
            
            # Install/Update Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # Run migrations
            php artisan migrate --force
            
            # Clear and cache config
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Set permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            
            # Restart PHP-FPM
            sudo systemctl reload php8.2-fpm
            
            echo "✅ Backend deployment completed"
          ENDSSH

      - name: Deploy Frontend
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            set -e
            
            cd /var/www/soso-delivery/frontend
            
            # Install dependencies
            npm ci --production=false
            
            # Build Next.js app
            npm run build
            
            # Restart PM2 process
            pm2 restart soso-delivery-frontend || pm2 start npm --name "soso-delivery-frontend" -- start
            pm2 save
            
            echo "✅ Frontend deployment completed"
          ENDSSH

      - name: Reload Nginx
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Nginx reloaded"
          ENDSSH

      - name: Deployment Status
        run: |
          echo "🚀 Deployment to soso-delivery.xyz completed successfully!"
          echo "Backend: https://soso-delivery.xyz/admin"
          echo "Frontend: https://soso-delivery.xyz"
          echo "API: https://soso-delivery.xyz/api/v1"
