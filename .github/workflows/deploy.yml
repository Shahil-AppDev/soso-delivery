name: Deploy to Hetzner VPS

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy StackFood to Hetzner VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 77.42.34.90 >> ~/.ssh/known_hosts

      - name: Deploy Backend (Laravel Admin Panel)
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            set -e
            
            # Navigate to backend directory
            cd /var/www/soso-delivery.xyz/backend
            
            # Pull latest changes
            git pull origin main
            
            # Install/Update Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # Run migrations
            php artisan migrate --force
            
            # Clear and cache config
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Set permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            
            # Restart services
            sudo systemctl reload php8.1-fpm
            
            echo "✅ Backend deployment completed"
          ENDSSH

      - name: Deploy Frontend (Next.js React)
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            set -e
            
            # Navigate to frontend directory
            cd /var/www/soso-delivery.xyz/frontend
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies
            npm ci --production=false
            
            # Build Next.js app
            npm run build
            
            # Restart PM2 process
            pm2 restart soso-delivery-frontend || pm2 start npm --name "soso-delivery-frontend" -- start
            pm2 save
            
            echo "✅ Frontend deployment completed"
          ENDSSH

      - name: Reload Nginx
        run: |
          ssh root@77.42.34.90 << 'ENDSSH'
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Nginx reloaded"
          ENDSSH

      - name: Deployment Status
        run: |
          echo "🚀 Deployment to soso-delivery.xyz completed successfully!"
          echo "Backend: https://soso-delivery.xyz/admin"
          echo "Frontend: https://soso-delivery.xyz"
